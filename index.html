<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedMegaBoy Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <header class="mc-header">
        <div class="logo-container">
            <img id="player-avatar" src="" alt="RedMegaBoy" class="pixel-avatar">
            <h1>RedMegaBoy Vault</h1>
        </div>
        
        <div class="controls-container">
            <input type="text" id="search-input" class="mc-input" placeholder="Пошук предметів..." autocomplete="off">
        </div>
        
        <div class="header-spacer"></div> 
    </header>

    <main class="mc-main">
        <aside class="mc-sidebar">
            <h3>Категорії</h3>
            <div id="categories-container" class="categories-list">
                </div>
        </aside>

        <section class="mc-content">
            <div id="items-grid" class="items-grid">
                <div class="loading">Завантаження складу...</div>
            </div>
        </section>

        <aside class="mc-cart-sidebar">
            <div class="cart-header">
                <h3>Кошик (<span id="cart-count">0</span>)</h3>
            </div>
            <div id="cart-items" class="cart-items-list">
                <div class="empty-cart">Кошик порожній</div>
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    Разом:<br>
                    <span id="total-ore" class="ore-text" style="font-size: 14px;">0 Руди</span> <br>
                    <span id="total-diamonds" class="diamond-text">(0 алм.)</span>
                </div>
                <button id="checkout-btn" class="mc-button success-btn">Замовити</button>
            </div>
        </aside>
    </main>

    <div id="success-modal" class="mc-modal hidden">
        <div class="mc-modal-content mc-gui success-gui">
            <h2 class="ore-text" style="font-size: 16px;">Замовлення готове!</h2>
            <p style="margin-top: 10px;">Текст скопійовано в буфер обміну.</p>
            <div class="cmd-box">Встав це в гру: <br> <span class="highlight">/msg RedMegaBoy [текст]</span></div>
            <button id="close-success-btn" class="mc-button">Зрозуміло</button>
        </div>
    </div>

    <div id="mc-tooltip" class="mc-tooltip hidden"></div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
